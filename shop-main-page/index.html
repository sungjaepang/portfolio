<!DOCTYPE html>
<!-- <html lang="en"> -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <title>Document</title> -->
    <title>Fashion Store</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <header class="header">
        <h1>FASHION STORE</h1>
        <nav>
            <ul>
                <li>NEW</li>
                <li>BEST</li>
                <li>SALE</li>
                <li>BRAND</li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-inner">
            <p class="hero-lable">2026 NEW SEASON</p>
            <h2>Spring Collection</h2>
            <p class="hero-desc">깔끔한 상품 레이아웃과 반응형 구조를 중심으로 제작한 쇼핑몰 메인 페이지입니다.</p>
        </div>
    </section>

    <section class="products">
        <!-- <div class="product"> -->
        <article class="product">
            <img src="images/basic-tshirt.jpeg" alt="Basic T-Shirt" />
            <!-- <p>Basic T-Shirt</p> -->
            <p class="name">Basic T-Shirt</p>
            <span>29,000원</span>
        </article>

        <article class="product">
            <img src="images/denim-jacket.jpeg" alt="Denim Jacket" style="object-fit: cover;"/>
            <p class="name">Denim Jacket</p>
            <span>89,000원</span>
        </article>
        
        <article class="product">
            <img src="images/minimal-bag.jpeg" alt="Minimal Bag" />
            <p class="name">Minimal Bag</p>
            <span>59,000원</span>
        </article>
        
        <article class="product">
            <img src="images/white-sneakers.jpeg" alt="White Sneakers" />
            <p class="name">White Sneakers</p>
            <span>79,000원</span>
        </article>
    </section>

    <footer>
        <p>© 2026 Fashion Store</p>
    </footer>

    <script src="js/script.js"></script>
    

</body>
</html>
